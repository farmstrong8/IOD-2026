<!doctype html>
<html lang="en">
    <head>
        <title>page title</title>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header>
            <h1>Hello World</h1>
        </header>
        <section>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Articles</a></li>
                </ul>
            </nav>
            <article>
                <h2>Article heading</h2>
                <form onsubmit="orderNow()">
                    <div>
                        <label for="firstName">First name:</label><br />
                        <input
                            type="text"
                            id="firstName"
                            name="firstName"
                            value="Joel"
                        />
                    </div>
                    <div>
                        <label for="lastName">Last name:</label><br />
                        <input
                            type="text"
                            id="lastName"
                            name="lastName"
                            value="Doe"
                        />
                    </div>
                    <input type="submit" value="Order Now" />
                </form>
            </article>
            <aside>
                <h2>Related</h2>
                <ul>
                    <li><a href="#">Article 1</a></li>
                    <li><a href="#">Article 2</a></li>
                </ul>
            </aside>
        </section>
        <footer>
            <p>@copyright 2050 by nobody. all rights reversed</p>
        </footer>
        <script>
            function orderNow() {
                alert("Your order will be shipped soon.");
            }
            // const button = document.getElementById("orderNow");
            // button.addEventListener("click", orderNow);
        </script>
    </body>
</html>
